<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alex's OnShape Portfolio</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --aero-deep: #2b6cb0;
    --aero-muted: #3a6a9a;
    --aero-glass-border: rgba(180,230,255,0.45);
    --aero-hero-bg: linear-gradient(160deg,#b8e0ff 0%,#d0f4e8 50%,#e8f0ff 100%);
    --aero-tag-mech: #1e7fc0;
    --aero-tag-logo: #14a37f;
    --page-bg: linear-gradient(180deg, #e8f4ff 0%, #f0faee 50%, #edf3ff 100%);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--page-bg);
    min-height: 100vh;
    color: #0a2a4a;
    padding: 2rem 1rem 4rem;
  }

  .wrapper {
    max-width: 960px;
    margin: 0 auto;
  }

  /* HERO */
  .hero {
    background: var(--aero-hero-bg);
    border-radius: 28px;
    padding: 3rem 2.5rem 2.5rem;
    margin-bottom: 2.5rem;
    position: relative;
    overflow: hidden;
    border: 1.5px solid var(--aero-glass-border);
    box-shadow: 0 8px 40px rgba(43,108,176,0.10);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(180,230,255,0.08) 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -40px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,255,230,0.35) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--aero-muted);
    margin-bottom: 0.5rem;
  }
  .hero-title {
    font-family: 'Righteous', cursive;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    color: var(--aero-deep);
    line-height: 1.05;
    margin-bottom: 0.85rem;
    text-shadow: 0 2px 18px rgba(0,100,200,0.10);
  }
  .hero-sub {
    font-size: 15px;
    color: var(--aero-muted);
    max-width: 500px;
    line-height: 1.65;
    margin-bottom: 1.75rem;
  }
  .hero-stats {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .hero-stat {
    background: rgba(255,255,255,0.58);
    border: 1px solid var(--aero-glass-border);
    border-radius: 16px;
    padding: 0.65rem 1.25rem;
    backdrop-filter: blur(8px);
  }
  .hero-stat-num {
    font-family: 'Righteous', cursive;
    font-size: 1.7rem;
    color: var(--aero-deep);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 11px;
    color: var(--aero-muted);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--aero-muted);
    margin-bottom: 0.9rem;
    padding-left: 2px;
  }

  /* FEATURED STRIP */
  .featured-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 14px;
    margin-bottom: 2.5rem;
  }
  .featured-card {
    background: linear-gradient(140deg, rgba(220,240,255,0.9) 0%, rgba(200,255,235,0.65) 100%);
    border: 1.5px solid var(--aero-glass-border);
    border-radius: 20px;
    padding: 1.35rem 1.2rem 1.1rem;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 2px 12px rgba(43,108,176,0.07);
  }
  .featured-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38%;
    background: linear-gradient(180deg, rgba(255,255,255,0.5) 0%, transparent 100%);
    border-radius: 20px 20px 0 0;
    pointer-events: none;
  }
  .featured-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(43,108,176,0.14); }
  .featured-icon {
    width: 44px; height: 44px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.75rem;
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(180,230,255,0.5);
  }
  .featured-name {
    font-family: 'Righteous', cursive;
    font-size: 15px;
    color: var(--aero-deep);
    margin-bottom: 5px;
  }

  /* FILTER BAR */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    border-radius: 20px;
    padding: 6px 16px;
    border: 1.5px solid rgba(180,230,255,0.5);
    background: rgba(255,255,255,0.55);
    color: var(--aero-muted);
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--aero-deep);
    color: #fff;
    border-color: var(--aero-deep);
  }

  /* COUNT */
  .count-line {
    font-size: 12px;
    color: var(--aero-muted);
    margin-bottom: 0.85rem;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 13px;
  }
  .card {
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(180,230,255,0.45);
    border-radius: 17px;
    padding: 1.1rem 1rem 0.9rem;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    display: block;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 6px rgba(43,108,176,0.05);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32%;
    background: linear-gradient(180deg, rgba(255,255,255,0.52) 0%, transparent 100%);
    border-radius: 17px 17px 0 0;
    pointer-events: none;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(43,108,176,0.13); }
  .card-icon { margin-bottom: 7px; display: block; }
  .card-name {
    font-family: 'Righteous', cursive;
    font-size: 13.5px;
    color: var(--aero-deep);
    line-height: 1.25;
    margin-bottom: 6px;
  }
  .card-tag {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-radius: 20px;
    padding: 2px 8px;
    display: inline-block;
  }
  .type-mech { background: rgba(30,127,192,0.14); color: #1e7fc0; }
  .type-logo { background: rgba(20,163,127,0.14); color: #14a37f; }

  .card-open {
    position: absolute;
    top: 10px; right: 10px;
    width: 24px; height: 24px;
    border-radius: 8px;
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(180,220,255,0.55);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover .card-open { opacity: 1; }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--aero-muted);
    letter-spacing: 0.04em;
  }
  .footer a { color: var(--aero-deep); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>

  {name:"FRC Part",url:"https://cad.onshape.com/documents/05912fbec00c63774f2c2ec7/w/69eb7d748d315d922d646a3d/e/0da31566e5d5d67bda178101?renderMode=0&uiState=69d41c41a29f29c1fcb5120d",cat:"mechanical"},
  {name:"Angle V Block",url:"https://cad.onshape.com/documents/a7587f617e8629adfe2885b7/w/9638ecd37ec17bf4763677a0/e/87280132294e8cce1a83421c?renderMode=0&uiState=69d41c5b51d344b62622ce46",cat:"mechanical"},
  {name:"Latch Clip",url:"https://cad.onshape.com/documents/addb98b0a2a0b553feb5a4eb/w/e83591319d44293697d069da/e/1bf7594b6ae790961f090de3?renderMode=0&uiState=69d41c6b23cd3b5c58f989b8",cat:"mechanical"},
];

const featured = ["Geneva Wheel","Coca Cola Logo","Transfer Fork","Swivel Yoke","Starbucks Logo","TikTok Logo"];

const mechSVG = `<svg viewBox="0 0 24 24" fill="none" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3" stroke="#1e7fc0" stroke-width="1.8"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12" stroke="#1e7fc0" stroke-width="1.8" stroke-linecap="round"/></svg>`;
const logoSVG = `<svg viewBox="0 0 24 24" fill="none" width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#14a37f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const openSVG = `<svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 10L10 2M10 2H5M10 2v5" stroke="#1e7fc0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

function renderFeatured() {
  const strip = document.getElementById('featured-strip');
  featured.forEach(name => {
    const m = models.find(x => x.name === name);
    if (!m) return;
    const a = document.createElement('a');
    a.href = m.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'featured-card';
    a.innerHTML = `
      <div class="featured-icon">${m.cat === 'logo' ? logoSVG : mechSVG}</div>
      <div class="featured-name">${m.name}</div>
      <span class="card-tag type-${m.cat === 'logo' ? 'logo' : 'mech'}">${m.cat === 'logo' ? 'Logo' : 'Mechanical'}</span>`;
    strip.appendChild(a);
  });
}

function renderGrid(filter) {
  const grid = document.getElementById('main-grid');
  const countLine = document.getElementById('count-line');
  grid.innerHTML = '';
  const filtered = models.filter(m => filter === 'all' || m.cat === filter);
  countLine.textContent = `${filtered.length} model${filtered.length !== 1 ? 's' : ''}`;
  filtered.forEach(m => {
    const a = document.createElement('a');
    a.href = m.url;
    a.target = '_blank';
    a.rel = 'noopener';
    a.className = 'card';
    a.innerHTML = `
      <span class="card-icon">${m.cat === 'logo' ? logoSVG : mechSVG}</span>
      <div class="card-name">${m.name}</div>
      <span class="card-tag type-${m.cat === 'logo' ? 'logo' : 'mech'}">${m.cat === 'logo' ? 'Logo' : 'Mechanical'}</span>
      <div class="card-open">${openSVG}</div>`;
    grid.appendChild(a);
  });
  document.getElementById('total-count').textContent = models.length;
}

function setFilter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(f);
}

renderFeatured();
renderGrid('all');
</script>
</body>
</html>
